                osc.type = type;

                gain.gain.setValueAtTime(0.0001, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(gainValue, ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            };

            { id: '94', category: "自然", question: "雲兒見它讓路，樹兒見它點頭。", answer: "風" },
            { id: '95', category: "物品", question: "兩隻小口袋，天天隨身帶。", answer: "襪子" },
            { id: '96', category: "台灣地名", question: "海中綠洲（打一地名）。", answer: "澎湖" },
            { id: '97', category: "字謎", question: "十個哥哥。", answer: "克" },
            { id: '98', category: "食物", question: "白白皮膚嫩又滑，豆子磨成漿來做。", answer: "豆腐" },
            { id: '99', category: "成語", question: "快刀斬亂麻（打一成語）。", answer: "乾淨俐落" },
            { id: '100', category: "台灣地名", question: "長生不老（打一地名）。", answer: "恆春" }
        ];

        const App = () => {
            const [view, setView] = useState('menu'); 
            const [mode, setMode] = useState('single'); 
            const [teamCount, setTeamCount] = useState(2);
            const [round, setRound] = useState(0); 
            const [gameRiddles, setGameRiddles] = useState([]); 
            const [completed, setCompleted] = useState(new Set());
            const [scores, setScores] = useState({});
            const [activeTeamIdx, setActiveTeamIdx] = useState(0);
            const [timer, setTimer] = useState(0);
            const [selectedRiddle, setSelectedRiddle] = useState(null);
            const [userInput, setUserInput] = useState('');
            const [feedback, setFeedback] = useState(null); 
            const [hintLevel, setHintLevel] = useState(0);
            const [showFullAnswer, setShowFullAnswer] = useState(false);

            const [riddlePool, setRiddlePool] = useState(INITIAL_RIDDLES);
            const [selectedPoolIds, setSelectedPoolIds] = useState(new Set(INITIAL_RIDDLES.map(r => r.id)));
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [newRiddle, setNewRiddle] = useState({ category: '自訂', question: '', answer: '' });
            const [draggedIdx, setDraggedIdx] = useState(null);

            const sound = useSoundEffect();

            useEffect(() => {
                let interval;
                if (view === 'game') {
                    interval = setInterval(() => setTimer(prev => prev + 1), 1000);
                }
                return () => clearInterval(interval);
            }, [view]);

            const handleModeClick = (m) => {
                sound.playClick();
                setMode(m);
                if (m === 'group') setView('teamSelect');
                else startNewGame(m, 1);
            };

            const startNewGame = (m, tc) => {
                const initialScores = {};
                for (let i = 0; i < tc; i++) initialScores[i] = 0;
                setScores(initialScores);
                setTeamCount(tc);
                setRound(0);
                setCompleted(new Set());
                setTimer(0);
                setActiveTeamIdx(0);
                const availablePool = riddlePool.filter(r => selectedPoolIds.has(r.id));
                setGameRiddles(availablePool);
                setView('game');
            };

            const handleNextRound = () => {
                sound.playClick();
                if ((round + 1) * 20 >= gameRiddles.length) setView('result');
                else {
                    setRound(prev => prev + 1);
                    setCompleted(new Set());
                    setView('game');
                }
            };

            const currentRoundRiddles = gameRiddles.slice(round * 20, (round + 1) * 20);

            const handleRiddleClick = (index) => {
                if (completed.has(index)) return;
                sound.playClick();
                setSelectedRiddle({ ...currentRoundRiddles[index], index });
                setUserInput('');
                setFeedback(null);
                setHintLevel(0);
                setShowFullAnswer(false);
            };

            const checkAnswer = () => {
                if (userInput.trim() === selectedRiddle.answer || showFullAnswer) {
                    setFeedback('correct');
                    sound.playCorrect();
                    setCompleted(prev => {
                        const next = new Set(prev);
                        next.add(selectedRiddle.index);
                        return next;
                    });
                    setScores(prev => ({ ...prev, [activeTeamIdx]: (prev[activeTeamIdx] || 0) + (showFullAnswer ? 0 : 1) }));
                    setTimeout(() => {
                        setSelectedRiddle(null);
                        if (mode === 'group') setActiveTeamIdx((activeTeamIdx + 1) % teamCount);
                        if (completed.size + 1 === Math.min(20, currentRoundRiddles.length)) setView('roundSummary');
                    }, 1200);
                } else {
                    setFeedback('wrong');
                    sound.playWrong();
                    setTimeout(() => setFeedback(null), 1000);
                }
            };

            const handleDragStart = (idx) => setDraggedIdx(idx);
            const handleDragOver = (e) => e.preventDefault();
            const handleDrop = (idx) => {
                if (draggedIdx === null || draggedIdx === idx) return;
                sound.playClick();
                const newPool = [...riddlePool];
                const draggedItem = newPool[draggedIdx];
                newPool.splice(draggedIdx, 1);
                newPool.splice(idx, 0, draggedItem);
                setRiddlePool(newPool);
                setDraggedIdx(null);
            };

            const addNewRiddle = () => {
                if (!newRiddle.question || !newRiddle.answer) return;
                sound.playClick();
                const id = Date.now().toString();
                setRiddlePool(prev => [{ ...newRiddle, id }, ...prev]);
                setSelectedPoolIds(prev => new Set(prev).add(id));
                setNewRiddle({ category: '自訂', question: '', answer: '' });
            };

            const formatTime = (s) => {
                const mins = Math.floor(s / 60);
                const secs = s % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const Lantern = ({ number, category, isDone, onClick }) => (
                <div onClick={onClick} className={`relative cursor-pointer transition-all duration-500 group flex flex-col items-center ${isDone ? 'opacity-50' : 'hover:scale-110 active:scale-95'}`}>
                    {/* 類別標籤 */}
                    <div className={`mb-3 px-4 py-1 rounded-full text-sm font-black border transition-all shadow-sm ${isDone ? 'bg-gray-800 text-gray-400 border-gray-600' : 'bg-yellow-500/20 text-yellow-400 border-yellow-500/50 group-hover:bg-yellow-500 group-hover:text-red-950'}`}>
                        {category}
                    </div>

                    <div className="relative">
                        {/* 提手繩 */}
                        <div className="absolute -top-3 left-1/2 -translate-x-1/2 w-0.5 h-3 bg-yellow-600/50" />
                        
                        {/* 燈籠本體 */}
                        <div className={`w-28 h-32 rounded-[3rem] relative flex items-center justify-center border-2 overflow-hidden transition-all shadow-[0_8px_20px_rgba(0,0,0,0.5)] ${isDone ? 'bg-gray-800 border-gray-600' : 'bg-gradient-to-b from-red-500 via-red-600 to-red-800 border-yellow-500/40'}`}>
                            {!isDone && <div className="absolute inset-0 lantern-inner-glow" />}
                            
                            {/* 燈籠架線條 */}
                            <div className="absolute inset-0 flex justify-around px-5 pointer-events-none opacity-20">
                                <div className="w-px h-full bg-black/40" />
                                <div className="w-px h-full bg-black/40" />
                            </div>

                            {/* 數字 - 如果完成則縮小並降低透明度 */}
                            <span className={`text-white font-serif font-black transition-all ${isDone ? 'text-2xl opacity-20' : 'text-5xl drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]'}`}>
                                {number}
                            </span>

                            {/* 上下箍環 */}
                            <div className="absolute top-0 w-full h-2.5 bg-gradient-to-r from-yellow-800 via-yellow-400 to-yellow-800 border-b border-yellow-900/50" />
                            <div className="absolute bottom-0 w-full h-2.5 bg-gradient-to-r from-yellow-800 via-yellow-400 to-yellow-800 border-t border-yellow-900/50" />
                        </div>

                        {/* 底部流蘇 */}
                        <div className="flex flex-col items-center mt-[-2px]">
                            <div className="w-6 h-1 bg-yellow-600 rounded-sm" />
                            <div className="w-0.5 h-4 bg-red-700" />
                            <div className="flex gap-0.5">
                                <div className="w-1.5 h-10 bg-red-600 rounded-full origin-top animate-pulse" />
                                <div className="w-1.5 h-12 bg-red-700 rounded-full origin-top animate-pulse" />
                                <div className="w-1.5 h-10 bg-red-600 rounded-full origin-top animate-pulse" />
                            </div>
                        </div>

                        {/* 答對後的精緻印章樣式 */}
                        {isDone && (
                            <div className="absolute -top-2 -right-2 z-30">
                                <div className="done-stamp w-12 h-12 rounded-full flex items-center justify-center animate-in zoom-in duration-300">
                                    <Icon name="check" size={28} className="text-yellow-200" />
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-red-950 text-yellow-100 font-sans selection:bg-yellow-500 selection:text-red-950 overflow-hidden relative flex flex-col">
                    {/* 背景動態裝飾 */}
                    <div className="absolute inset-0 opacity-5 pointer-events-none overflow-hidden">
                        {[...Array(10)].map((_, i) => (
                            <div key={i} className="absolute border-2 border-yellow-500 rounded-full w-96 h-48" style={{ top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`, transform: `rotate(${Math.random() * 360}deg)` }} />
                        ))}
                    </div>

                    {(view === 'game' || view === 'roundSummary') && (
                        <div className="bg-red-900/90 backdrop-blur-md border-b-2 border-yellow-600 p-4 sticky top-0 z-40 shadow-2xl flex flex-wrap justify-between items-center gap-4 font-serif">
                            <div className="flex items-center gap-4">
                                <div className="flex items-center gap-2 bg-black/30 px-4 py-2 rounded-full border border-yellow-700 shadow-inner">
                                    <Icon name="timer" size={22} className="text-yellow-400" />
                                    <span className="font-mono text-2xl">{formatTime(timer)}</span>
                                </div>
                                <div className="flex items-center gap-2 bg-black/30 px-4 py-2 rounded-full border border-yellow-700 shadow-inner">
                                    <Icon name="trophy" size={22} className="text-yellow-400" />
                                    <span className="text-2xl font-bold">{completed.size} / {Math.min(20, currentRoundRiddles.length)}</span>
                                </div>
                            </div>
                            {mode === 'group' && (
                                <div className="flex items-center justify-center gap-2 flex-grow max-w-2xl px-4">
                                    {[...Array(teamCount)].map((_, i) => (
                                        <button key={i} onClick={() => { sound.playClick(); setActiveTeamIdx(i); }} className={`flex-1 min-w-0 max-w-[150px] px-2 py-2 rounded-2xl border-2 transition-all flex flex-col items-center group relative ${activeTeamIdx === i ? 'bg-yellow-600 text-red-950 border-yellow-300 shadow-[0_0_20px_rgba(234,179,8,0.5)] scale-105' : 'bg-red-800 border-red-700 text-yellow-600 hover:border-yellow-900'}`}>
                                            <span className="text-[12px] uppercase font-black opacity-80 truncate w-full text-center">Team {i + 1}</span>
                                            <span className="text-3xl font-black">{(scores[i] || 0).toString()}</span>
                                        </button>
                                    ))}
                                </div>
                            )}
                            <div className="flex gap-2">
                                <button onClick={() => { sound.playClick(); setView('menu'); }} className="p-3 hover:bg-white/10 rounded-full transition-all text-yellow-500"><Icon name="refresh" size={28} /></button>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 relative z-10 flex flex-col items-center justify-center p-4">
                        {view === 'menu' && (
                            <div className="max-w-4xl w-full text-center space-y-16 animate-in fade-in zoom-in duration-700">
                                <div className="relative inline-block mb-4 group">
                                    <div className="relative">
                                        <h1 className="text-9xl md:text-[11.5rem] font-serif font-black tracking-widest leading-tight drop-shadow-[0_10px_20px_rgba(0,0,0,0.7)] bg-clip-text text-transparent bg-gradient-to-b from-yellow-50 via-yellow-500 to-yellow-900 calligraphy-title">
                                            元宵猜燈謎
                                        </h1>
                                        <div className="absolute -inset-x-12 -bottom-2 h-[4px] bg-gradient-to-r from-transparent via-yellow-700/60 to-transparent" />
                                    </div>
                                    <p className="mt-12 text-yellow-200/80 text-4xl font-serif italic tracking-[0.5em] drop-shadow-sm opacity-90">
                                        舊時燈謎新玩法，健腦暖心慶元宵
                                    </p>
                                </div>
                                <div className="space-y-8 flex flex-col items-center w-full pt-10">
                                    <button onClick={() => handleModeClick('single')} className="w-full max-w-md bg-red-700 hover:bg-red-600 text-yellow-100 py-8 rounded-[3rem] text-4xl font-black border-b-[12px] border-red-950 transition-all flex items-center justify-center gap-5 active:translate-y-2 active:border-b-[4px] shadow-2xl">
                                        <Icon name="user" size={40}/> 個人模式挑戰
                                    </button>
                                    <button onClick={() => handleModeClick('group')} className="w-full max-w-md bg-yellow-600 hover:bg-yellow-500 text-red-950 py-8 rounded-[3rem] text-4xl font-black border-b-[12px] border-yellow-800 transition-all flex items-center justify-center gap-5 active:translate-y-2 active:border-b-[4px] shadow-2xl">
                                        <Icon name="users" size={40}/> 分組趣味競賽
                                    </button>
                                </div>
                                <button onClick={() => { sound.playClick(); setIsSettingsOpen(true); }} className="fixed bottom-10 right-10 bg-red-900/90 backdrop-blur-md p-8 rounded-full border-2 border-yellow-600 shadow-[0_0_30px_rgba(0,0,0,0.4)] hover:bg-red-800 hover:scale-110 transition-all text-yellow-500 z-30 group">
                                    <Icon name="settings" size={48} className="group-hover:rotate-180 transition-transform duration-1000" />
                                </button>
                                <Footer />
                            </div>
                        )}

                        {view === 'teamSelect' && (
                            <div className="max-w-5xl w-full text-center space-y-10 animate-in fade-in slide-in-from-bottom duration-500">
                                <h2 className="text-8xl font-serif font-black text-yellow-500 mb-20 drop-shadow-lg">請選擇競賽組數</h2>
                                <div className="grid grid-cols-3 gap-12 p-4">
                                    {[2, 3, 4].map(num => (
                                        <button key={num} onClick={() => { sound.playClick(); startNewGame('group', num); }} className="bg-red-800 hover:bg-red-700 border-4 border-yellow-600 rounded-[4rem] py-24 transition-all transform hover:scale-105 flex flex-col items-center group shadow-2xl">
                                            <span className="text-9xl md:text-[11rem] font-black text-yellow-400 group-hover:text-yellow-200 drop-shadow-md">{num}</span>
                                            <span className="text-4xl font-bold mt-8 opacity-80 uppercase tracking-widest font-serif">組隊競賽</span>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => { sound.playClick(); setView('menu'); }} className="text-yellow-500 hover:text-yellow-300 font-bold text-4xl underline underline-offset-[16px] mt-20 transition-all font-serif">返回主選單</button>
                                <Footer />
                            </div>
                        )}

                        {view === 'game' && (
                            <div className="w-full max-w-7xl animate-in fade-in duration-700 pb-24">
                                <div className="text-center mb-16">
                                    <span className="bg-red-900/95 px-14 py-5 rounded-full border-2 border-yellow-600 text-yellow-400 font-black text-3xl shadow-xl tracking-widest uppercase font-serif">
                                        當前挑戰：第 {(round * 20 + 1).toString()} 至 {(round * 20 + Math.min(20, currentRoundRiddles.length)).toString()} 題
                                    </span>
                                </div>
                                <div className="bg-red-900/40 backdrop-blur-xl border-4 border-yellow-600/30 rounded-[5rem] p-16 md:p-24 shadow-inner grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-y-28 gap-x-14 justify-items-center">
                                    {currentRoundRiddles.map((r, i) => (
                                        <Lantern key={r.id} number={round * 20 + i + 1} category={r.category} isDone={completed.has(i)} onClick={() => handleRiddleClick(i)} />
                                    ))}
                                </div>
                                <Footer />
                            </div>
                        )}

                        {view === 'roundSummary' && (
                            <div className="text-center space-y-10 animate-in zoom-in duration-500 pb-24">
                                <div className="text-[12rem] mb-6 animate-bounce">🏆</div>
                                <h2 className="text-[7rem] font-serif font-black text-yellow-500 drop-shadow-md">挑戰完成！</h2>
                                <div className="bg-red-900/60 p-16 rounded-[5rem] border-4 border-yellow-600 inline-block min-w-[600px] shadow-2xl">
                                    <p className="text-5xl mb-10 font-bold text-yellow-200 font-serif">第 {(round * 20 + 1).toString()} ~ {(round * 20 + Math.min(20, currentRoundRiddles.length)).toString()} 題</p>
                                    {mode === 'group' && (
                                        <div className="space-y-6 pt-10 border-t-2 border-yellow-600/30">
                                            {[...Array(teamCount)].map((_, i) => (
                                                <div key={i} className="flex justify-between items-center text-5xl bg-black/40 px-16 py-10 rounded-[3rem]">
                                                    <span className="font-black text-yellow-50">第 {(i + 1).toString()} 組</span>
                                                    <span className="font-black text-yellow-400">{(scores[i] || 0).toString()} 分</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="flex gap-12 justify-center mt-12">
                                    <button onClick={() => { sound.playClick(); setView('result'); }} className="bg-red-800 hover:bg-red-700 text-yellow-400 px-24 py-10 rounded-[4rem] text-5xl font-black shadow-xl border-b-[12px] border-red-950 transition-all">結束遊戲</button>
                                    { (round + 1) * 20 < gameRiddles.length && (
                                        <button onClick={handleNextRound} className="bg-yellow-600 hover:bg-yellow-500 text-red-950 px-24 py-10 rounded-[4rem] text-5xl font-black shadow-xl flex items-center gap-8 border-b-[12px] border-yellow-800 transition-all">
                                            下一輪題 <Icon name="arrowRight" size={48}/>
                                        </button>
                                    )}
                                </div>
                                <Footer />
                            </div>
                        )}

                        {view === 'result' && (
                            <div className="text-center space-y-12 animate-in zoom-in pb-24">
                                <div className="text-[12rem] mb-10 animate-pulse">🎆</div>
                                <h2 className="text-[8.5rem] font-serif font-black text-yellow-500 drop-shadow-2xl">燈謎大會大成功</h2>
                                <div className="bg-red-900/50 p-24 rounded-[6rem] border-4 border-yellow-600 inline-block min-w-[800px] shadow-2xl">
                                    <p className="text-7xl mb-14 font-black text-yellow-100 font-serif">總耗時：<span className="text-yellow-400 font-mono text-[7rem] ml-12">{formatTime(timer)}</span></p>
                                    {mode === 'group' && (
                                        <div className="space-y-10 pt-14 border-t-4 border-yellow-600/30">
                                            {[...Array(teamCount)].map((_, i) => (
                                                <div key={i} className={`flex justify-between items-center text-7xl px-24 py-14 rounded-[4rem] ${scores[i] === Math.max(...Object.values(scores)) ? 'bg-yellow-600/30 border-4 border-yellow-500 shadow-[0_0_50px_rgba(234,179,8,0.5)]' : 'bg-black/60'}`}>
                                                    <span className="font-serif font-black">第 {(i + 1).toString()} 組</span>
                                                    <span className="font-black text-yellow-400">{(scores[i] || 0).toString()} 分</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => { sound.playClick(); setView('menu'); }} className="block mx-auto mt-24 bg-yellow-600 hover:bg-yellow-500 text-red-950 px-32 py-12 rounded-[5.5rem] text-7xl font-black shadow-2xl border-b-[16px] border-yellow-800 active:translate-y-2">回主畫面</button>
                                <Footer />
                            </div>
                        )}
                    </main>

                    {/* 設定視窗 */}
                    {isSettingsOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md animate-in fade-in">
                            <div className="bg-red-900 border-4 border-yellow-600 rounded-[5rem] w-full max-w-6xl h-[90vh] flex flex-col shadow-2xl overflow-hidden font-serif">
                                <div className="p-14 border-b-2 border-yellow-600/30 flex justify-between items-center bg-red-800/80">
                                    <div>
                                        <h2 className="text-7xl font-black text-yellow-500 flex items-center gap-6"><Icon name="settings" size={64}/> 題庫設定</h2>
                                        <p className="text-yellow-200/60 mt-5 text-3xl font-serif">拖曳題目調整順序，序號決定遊戲燈籠編號</p>
                                    </div>
                                    <button onClick={() => { sound.playClick(); setIsSettingsOpen(false); }} className="p-6 hover:bg-white/10 rounded-full text-yellow-500 transition-all"><Icon name="close" size={64} /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-14 custom-scrollbar space-y-12 bg-red-950/40">
                                    <div className="bg-red-900 p-10 rounded-[4rem] border-2 border-yellow-600/30 shadow-xl">
                                        <h3 className="text-4xl font-black mb-8 flex items-center gap-4"><Icon name="plus" size={40}/> 手動新增題目</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                            <input type="text" placeholder="類別" value={newRiddle.category} onChange={e => setNewRiddle(s => ({...s, category: e.target.value}))} className="bg-red-950 border-2 border-yellow-600/50 rounded-[2rem] px-8 py-5 text-3xl outline-none focus:border-yellow-400 text-white" />
                                            <input type="text" placeholder="謎題內容" value={newRiddle.question} onChange={e => setNewRiddle(s => ({...s, question: e.target.value}))} className="bg-red-950 border-2 border-yellow-600/50 rounded-[2rem] px-8 py-5 text-3xl outline-none focus:border-yellow-400 text-white" />
                                            <div className="flex gap-8">
                                                <input type="text" placeholder="謎底" value={newRiddle.answer} onChange={e => setNewRiddle(s => ({...s, answer: e.target.value}))} className="flex-1 bg-red-950 border-2 border-yellow-600/50 rounded-[2rem] px-8 py-5 text-3xl outline-none focus:border-yellow-400 text-white" />
                                                <button onClick={addNewRiddle} className="bg-yellow-600 text-red-950 px-12 rounded-[2rem] font-black hover:bg-yellow-500 text-3xl shadow-lg transition-all">新增</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-8">
                                        <div className="flex justify-between items-center mb-10">
                                            <h3 className="text-5xl font-black">全部題型 ({riddlePool.length.toString()} 題)</h3>
                                            <div className="flex gap-12">
                                                <button onClick={() => { sound.playClick(); setSelectedPoolIds(new Set(riddlePool.map(r => r.id))); }} className="text-3xl text-yellow-500 font-bold hover:underline">全選</button>
                                                <button onClick={() => { sound.playClick(); setSelectedPoolIds(new Set()); }} className="text-3xl text-yellow-500 font-bold hover:underline">全不選</button>
                                            </div>
                                        </div>
                                        <div className="grid gap-4">
                                            {riddlePool.map((r, idx) => (
                                                <div key={r.id} draggable onDragStart={() => handleDragStart(idx)} onDragOver={handleDragOver} onDrop={() => handleDrop(idx)}
                                                    className={`bg-red-900/60 p-6 rounded-[2.5rem] border border-yellow-600/20 flex items-center justify-between group cursor-grab active:cursor-grabbing hover:border-yellow-600/50 transition-all ${draggedIdx === idx ? 'opacity-20 shadow-none' : 'shadow-lg'}`} >
                                                    <div className="flex items-center gap-8 flex-1 text-white">
                                                        <Icon name="grip" size={32} className="text-yellow-600/30" />
                                                        <div className="text-3xl font-black text-yellow-500 w-16 text-center">#{idx + 1}</div>
                                                        <button onClick={() => { sound.playClick(); const n = new Set(selectedPoolIds); if(n.has(r.id)) n.delete(r.id); else n.add(r.id); setSelectedPoolIds(n); }} className={`w-12 h-12 rounded-[1rem] border-2 flex items-center justify-center transition-all ${selectedPoolIds.has(r.id) ? 'bg-yellow-500 border-yellow-200 text-red-950' : 'border-yellow-600/30 text-transparent'}`} ><Icon name="check" size={32} /></button>
                                                        <div className="flex flex-col ml-6">
                                                            <span className="text-xl text-yellow-500/50 font-black tracking-widest uppercase">{r.category}</span>
                                                            <span className="text-3xl font-bold line-clamp-1">{r.question}</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-12 pr-8">
                                                        <span className="text-3xl text-yellow-400 font-mono bg-black/40 px-8 py-3 rounded-[1.5rem] border border-yellow-900/50">謎底: {r.answer}</span>
                                                        <button onClick={() => { sound.playClick(); setRiddlePool(prev => prev.filter(x => x.id !== r.id)); }} className="text-red-500 opacity-0 group-hover:opacity-100 p-4 hover:bg-red-500/20 rounded-full transition-all"><Icon name="trash" size={36} /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="p-14 border-t-2 border-yellow-600/30 text-center bg-red-800"><button onClick={() => { sound.playClick(); setIsSettingsOpen(false); }} className="bg-yellow-600 hover:bg-yellow-500 text-red-950 px-28 py-8 rounded-[4rem] text-5xl font-black shadow-xl border-b-[12px] border-yellow-800 transition-all">完成並關閉</button></div>
                            </div>
                        </div>
                    )}

                    {selectedRiddle && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl animate-in fade-in">
                            <div className="bg-red-800 border-[10px] border-yellow-500 rounded-[7rem] max-w-6xl w-full max-h-[92vh] overflow-y-auto shadow-[0_0_150px_rgba(0,0,0,1)] relative custom-scrollbar">
                                {mode === 'group' && (
                                    <div className="sticky top-12 left-12 z-50 pointer-events-none">
                                        <div className="absolute top-0 left-0 bg-white/90 backdrop-blur-lg text-red-950 px-14 py-6 rounded-full font-serif font-black shadow-2xl border-2 border-red-900/20 text-5xl">
                                            第 {(activeTeamIdx + 1).toString()} 組
                                        </div>
                                    </div>
                                )}
                                <div className="text-center p-20 md:p-28 space-y-24">
                                    <div className="inline-block px-16 py-5 bg-yellow-600 text-red-950 rounded-full text-5xl font-serif font-black shadow-lg border-b-8 border-yellow-800">{selectedRiddle.category} 謎題</div>
                                    <h3 className="text-8xl md:text-[6rem] font-serif font-black leading-tight text-yellow-50 tracking-wider drop-shadow-xl">{selectedRiddle.question}</h3>
                                    <div className="flex justify-center gap-10 flex-wrap">
                                        {[...selectedRiddle.answer].map((char, i) => (
                                            <div key={i} className={`w-32 h-32 md:w-36 md:h-36 border-4 rounded-[4rem] flex items-center justify-center text-8xl font-black transition-all ${i < hintLevel || showFullAnswer ? 'bg-yellow-500 text-red-950 border-yellow-200 scale-110 shadow-[0_0_50px_rgba(234,179,8,0.5)]' : 'bg-red-950/50 border-yellow-600/50 text-transparent'}`}>
                                                {(i < hintLevel || showFullAnswer) ? char : '?'}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="space-y-16">
                                        {!showFullAnswer && (
                                            <input autoFocus type="text" placeholder="請在此輸入謎底..." value={userInput} onChange={(e) => setUserInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && checkAnswer()}
                                                className={`w-full bg-red-950 border-4 rounded-[5rem] px-20 py-16 text-7xl text-center outline-none transition-all placeholder:text-red-900/30 text-white ${feedback === 'correct' ? 'border-green-500 text-green-400' : feedback === 'wrong' ? 'border-red-500 animate-shake' : 'border-yellow-600 focus:border-yellow-400 shadow-inner'}`} />
                                        )}
                                        <div className="grid grid-cols-2 gap-16">
                                            <button onClick={() => { sound.playClick(); if(hintLevel < selectedRiddle.answer.length) setHintLevel(h => h+1); }} disabled={hintLevel >= selectedRiddle.answer.length || showFullAnswer} className="py-12 rounded-[4rem] bg-orange-700 hover:bg-orange-600 text-yellow-100 flex items-center justify-center gap-8 disabled:opacity-30 transition-all font-black border-2 border-orange-500/30 text-5xl shadow-2xl"><Icon name="bulb" size={56}/> 提示一字</button>
                                            <button onClick={() => { sound.playClick(); setShowFullAnswer(true); setUserInput(selectedRiddle.answer); }} disabled={showFullAnswer} className="py-12 rounded-[4rem] bg-yellow-900 hover:bg-yellow-800 text-yellow-400 flex items-center justify-center gap-8 disabled:opacity-30 transition-all font-black border-2 border-yellow-700/30 text-5xl shadow-2xl"><Icon name="eye" size={56}/> 直接公布</button>
                                        </div>
                                        <div className="flex gap-16 pt-16">
                                            <button onClick={() => { sound.playClick(); setSelectedRiddle(null); }} className="flex-1 py-12 rounded-[4.5rem] border-4 border-yellow-700/50 hover:bg-red-700 text-yellow-600 font-serif font-black text-5xl transition-all">離開題目</button>
                                            <button onClick={checkAnswer} className="flex-[2] py-12 rounded-[4.5rem] bg-yellow-500 hover:bg-yellow-400 text-red-950 font-black text-7xl shadow-2xl transition-transform active:scale-95 border-b-[20px] border-yellow-800">
                                                {showFullAnswer ? (mode === 'group' ? '確認下一組' : '確認下一題') : '確定提交'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
