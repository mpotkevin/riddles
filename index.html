        const Icon = ({ name, size = 24, className = "" }) => (

        const useSoundEffect = () => {
            const audioCtxRef = useRef(null);
            const play = (freq, type, duration, gainValue = 0.1) => {
                try {
                    if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
                    const ctx = audioCtxRef.current;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(gainValue, ctx.currentTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + duration);
                } catch(e) {}
            };
            return {
                playCorrect: () => { play(523.25, 'sine', 0.4, 0.1); play(659.25, 'sine', 0.4, 0.1); },
                playWrong: () => play(150, 'sawtooth', 0.3, 0.08),
                playClick: () => play(880, 'sine', 0.1, 0.05)
            };
        };

        const Footer = ({ isSmall = false }) => (

            { id: '14', category: "動物", question: "大姐用嘴紮燈籠，二姐織網捉飛蟲。", answer: "蜘蛛" },

            { id: '47', category: "台灣地名", question: "天下太平（打一地名）。", answer: "太平" },
            { id: '48', category: "台灣地名", question: "忠孝節義（打一地名）。", answer: "善化" },
            { id: '49', category: "台灣地名", question: "大火（打一地名）。", answer: "赤崁" },
            { id: '50', category: "台灣地名", question: "長生不老（打一地名）。", answer: "恆春" }
        ];

        const App = () => {
            const [view, setView] = useState('menu'); 
            const [mode, setMode] = useState('single'); 
            const [teamCount, setTeamCount] = useState(2);
            const [round, setRound] = useState(0); 
            const [gameRiddles, setGameRiddles] = useState([]); 
            const [completed, setCompleted] = useState(new Set());
            const [scores, setScores] = useState({});
            const [activeTeamIdx, setActiveTeamIdx] = useState(0);
            const [timer, setTimer] = useState(0);
            const [selectedRiddle, setSelectedRiddle] = useState(null);
            const [userInput, setUserInput] = useState('');
            const [feedback, setFeedback] = useState(null); 
            const [hintLevel, setHintLevel] = useState(0);
            const [showFullAnswer, setShowFullAnswer] = useState(false);

            const [riddlePool, setRiddlePool] = useState(INITIAL_RIDDLES);
            const [selectedPoolIds, setSelectedPoolIds] = useState(new Set(INITIAL_RIDDLES.map(r => r.id)));
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [newRiddle, setNewRiddle] = useState({ category: '自訂', question: '', answer: '' });
            const [draggedIdx, setDraggedIdx] = useState(null);

            const sound = useSoundEffect();

            useEffect(() => {
                let interval;
                if (view === 'game') {
                    interval = setInterval(() => setTimer(prev => prev + 1), 1000);
                }
                return () => clearInterval(interval);
            }, [view]);

            const handleModeClick = (m) => {
                sound.playClick();
                setMode(m);
                if (m === 'group') setView('teamSelect');
                else startNewGame(m, 1);
            };

            const startNewGame = (m, tc) => {
                const initialScores = {};
                for (let i = 0; i < tc; i++) initialScores[i] = 0;
                setScores(initialScores);
                setTeamCount(tc);
                setRound(0);
                setCompleted(new Set());
                setTimer(0);
                setActiveTeamIdx(0);
                const availablePool = riddlePool.filter(r => selectedPoolIds.has(r.id));
                setGameRiddles(availablePool);
                setView('game');
            };

            const handleNextRound = () => {
                sound.playClick();
                if ((round + 1) * 20 >= gameRiddles.length) setView('result');
                else {
                    setRound(prev => prev + 1);
                    setCompleted(new Set());
                    setView('game');
                }
            };

            const currentRoundRiddles = gameRiddles.slice(round * 20, (round + 1) * 20);

            const handleRiddleClick = (index) => {
                if (completed.has(index)) return;
                sound.playClick();
                setSelectedRiddle({ ...currentRoundRiddles[index], index });
                setUserInput('');
                setFeedback(null);
                setHintLevel(0);
                setShowFullAnswer(false);
            };

            const checkAnswer = () => {
                if (userInput.trim() === selectedRiddle.answer || showFullAnswer) {
                    setFeedback('correct');
                    sound.playCorrect();
                    setCompleted(prev => {
                        const next = new Set(prev);
                        next.add(selectedRiddle.index);
                        return next;
                    });
                    setScores(prev => ({ ...prev, [activeTeamIdx]: (prev[activeTeamIdx] || 0) + (showFullAnswer ? 0 : 1) }));
                    setTimeout(() => {
                        setSelectedRiddle(null);
                        if (mode === 'group') setActiveTeamIdx((activeTeamIdx + 1) % teamCount);
                        if (completed.size + 1 === Math.min(20, currentRoundRiddles.length)) setView('roundSummary');
                    }, 1200);
                } else {
                    setFeedback('wrong');
                    sound.playWrong();
                    setTimeout(() => setFeedback(null), 1000);
                }
            };

            const handleDragStart = (idx) => setDraggedIdx(idx);
            const handleDragOver = (e) => e.preventDefault();
            const handleDrop = (idx) => {
                if (draggedIdx === null || draggedIdx === idx) return;
                sound.playClick();
                const newPool = [...riddlePool];
                const draggedItem = newPool[draggedIdx];
                newPool.splice(draggedIdx, 1);
                newPool.splice(idx, 0, draggedItem);
                setRiddlePool(newPool);
                setDraggedIdx(null);
            };

            const addNewRiddle = () => {
                if (!newRiddle.question || !newRiddle.answer) return;
                sound.playClick();
                const id = Date.now().toString();
                setRiddlePool(prev => [{ ...newRiddle, id }, ...prev]);
                setSelectedPoolIds(prev => new Set(prev).add(id));
                setNewRiddle({ category: '自訂', question: '', answer: '' });
            };

            const formatTime = (s) => {
                const mins = Math.floor(s / 60);
                const secs = s % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const Lantern = ({ number, category, isDone, onClick }) => (
                <div onClick={onClick} className={`relative cursor-pointer transition-all duration-300 group flex flex-col items-center ${isDone ? 'opacity-50' : 'hover:scale-105 active:scale-95'}`}>
                    <div className={`mb-1 px-3 py-0.5 rounded-full text-xs font-black border transition-all ${isDone ? 'bg-gray-800 text-gray-400 border-gray-600' : 'bg-yellow-500/20 text-yellow-400 border-yellow-500/50 group-hover:bg-yellow-500 group-hover:text-red-950'}`}>
                        {category}
                    </div>
                    <div className="relative">
                        <div className="absolute -top-2 left-1/2 -translate-x-1/2 w-0.5 h-2 bg-yellow-600/50" />
                        <div className={`w-20 h-24 rounded-[2rem] relative flex items-center justify-center border-2 overflow-hidden transition-all shadow-lg ${isDone ? 'bg-gray-800 border-gray-600' : 'bg-gradient-to-b from-red-500 via-red-600 to-red-800 border-yellow-500/40'}`}>
                            {!isDone && <div className="absolute inset-0 lantern-inner-glow" />}
                            <span className={`text-white font-serif font-black transition-all ${isDone ? 'text-xl opacity-20' : 'text-4xl drop-shadow-md'}`}>
                                {number}
                            </span>
                            <div className="absolute top-0 w-full h-1.5 bg-gradient-to-r from-yellow-800 via-yellow-400 to-yellow-800" />
                            <div className="absolute bottom-0 w-full h-1.5 bg-gradient-to-r from-yellow-800 via-yellow-400 to-yellow-800" />
                        </div>
                        {isDone && (
                            <div className="absolute -top-1 -right-1 z-30">
                                <div className="done-stamp w-8 h-8 rounded-full flex items-center justify-center animate-in zoom-in duration-300">
                                    <Icon name="check" size={18} className="text-yellow-200" />
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="h-screen bg-red-950 text-yellow-100 font-sans selection:bg-yellow-500 selection:text-red-950 overflow-hidden relative flex flex-col">
                    <div className="absolute inset-0 opacity-5 pointer-events-none">
                        {[...Array(8)].map((_, i) => (
                            <div key={i} className="absolute border-2 border-yellow-500 rounded-full w-64 h-32" style={{ top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`, transform: `rotate(${Math.random() * 360}deg)` }} />
                        ))}
                    </div>

                    {(view === 'game' || view === 'roundSummary') && (
                        <div className="bg-red-900/95 backdrop-blur-md border-b-2 border-yellow-600 p-3 sticky top-0 z-40 shadow-2xl flex justify-between items-center h-16 shrink-0">
                            <div className="flex items-center gap-4">
                                <div className="flex items-center gap-2 bg-black/30 px-3 py-1 rounded-full border border-yellow-700">
                                    <Icon name="timer" size={18} className="text-yellow-400" />
                                    <span className="font-mono text-xl">{formatTime(timer)}</span>
                                </div>
                                <div className="flex items-center gap-2 bg-black/30 px-3 py-1 rounded-full border border-yellow-700">
                                    <Icon name="trophy" size={18} className="text-yellow-400" />
                                    <span className="text-xl font-bold">{completed.size} / {Math.min(20, currentRoundRiddles.length)}</span>
                                </div>
                            </div>
                            {mode === 'group' && (
                                <div className="flex items-center justify-center gap-2 flex-grow max-w-xl px-4">
                                    {[...Array(teamCount)].map((_, i) => (
                                        <button key={i} onClick={() => { sound.playClick(); setActiveTeamIdx(i); }} className={`flex-1 min-w-0 max-w-[120px] px-2 py-1 rounded-xl border-2 transition-all flex flex-col items-center group relative ${activeTeamIdx === i ? 'bg-yellow-600 text-red-950 border-yellow-300 shadow-[0_0_15px_rgba(234,179,8,0.5)] scale-105' : 'bg-red-800 border-red-700 text-yellow-600 hover:border-yellow-900'}`}>
                                            <span className="text-[10px] uppercase font-black opacity-80 truncate">Team {i + 1}</span>
                                            <span className="text-xl font-black">{(scores[i] || 0).toString()}</span>
                                        </button>
                                    ))}
                                </div>
                            )}
                            <button onClick={() => { sound.playClick(); setView('menu'); }} className="p-2 hover:bg-white/10 rounded-full text-yellow-500 transition-all"><Icon name="refresh" size={24} /></button>
                        </div>
                    )}

                    <main className="flex-1 relative z-10 flex flex-col items-center justify-center p-4 min-h-0">
                        {view === 'menu' && (
                            <div className="max-w-4xl w-full text-center space-y-12 animate-in fade-in zoom-in duration-700 h-full flex flex-col justify-center">
                                <div className="relative inline-block mb-4 group">
                                    <h1 className="text-6xl md:text-8xl lg:text-9xl font-serif font-black leading-tight drop-shadow-xl bg-clip-text text-transparent bg-gradient-to-b from-yellow-50 via-yellow-500 to-yellow-900 calligraphy-title">
                                        元宵猜燈謎
                                    </h1>
                                    <p className="mt-8 text-yellow-200/80 text-2xl font-serif italic tracking-[0.4em] opacity-90">
                                        舊時燈謎新玩法，健腦暖心慶元宵
                                    </p>
                                </div>
                                <div className="space-y-6 flex flex-col items-center w-full">
                                    <button onClick={() => handleModeClick('single')} className="w-full max-w-sm bg-red-700 hover:bg-red-600 text-yellow-100 py-6 rounded-[2rem] text-2xl font-black border-b-[8px] border-red-950 transition-all flex items-center justify-center gap-4 active:translate-y-1 shadow-2xl">
                                        <Icon name="user" size={32}/> 個人模式挑戰
                                    </button>
                                    <button onClick={() => handleModeClick('group')} className="w-full max-w-sm bg-yellow-600 hover:bg-yellow-500 text-red-950 py-6 rounded-[2rem] text-2xl font-black border-b-[8px] border-yellow-800 transition-all flex items-center justify-center gap-4 active:translate-y-1 shadow-2xl">
                                        <Icon name="users" size={32}/> 分組趣味競賽
                                    </button>
                                </div>
                                <button onClick={() => { sound.playClick(); setIsSettingsOpen(true); }} className="fixed bottom-8 right-8 bg-red-900/90 backdrop-blur-md p-6 rounded-full border-2 border-yellow-600 shadow-xl hover:scale-110 transition-all text-yellow-500 z-30"><Icon name="settings" size={32}/></button>
                                <Footer />
                            </div>
                        )}

                        {view === 'teamSelect' && (
                            <div className="max-w-4xl w-full text-center space-y-10 h-full flex flex-col justify-center">
                                <h2 className="text-6xl font-serif font-black text-yellow-500 mb-10">請選擇競賽組數</h2>
                                <div className="grid grid-cols-3 gap-8 p-4 max-w-2xl mx-auto w-full">
                                    {[2, 3, 4].map(num => (
                                        <button key={num} onClick={() => { sound.playClick(); startNewGame('group', num); }} className="bg-red-800 hover:bg-red-700 border-4 border-yellow-600 rounded-[2.5rem] py-16 transition-all transform hover:scale-105 flex flex-col items-center shadow-xl">
                                            <span className="text-8xl font-black text-yellow-400">{num}</span>
                                            <span className="text-xl font-bold mt-4 opacity-80 uppercase tracking-widest font-serif">組隊競賽</span>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => { sound.playClick(); setView('menu'); }} className="text-yellow-500 hover:text-yellow-300 font-bold text-2xl underline underline-offset-8 transition-all font-serif">返回主選單</button>
                                <Footer isSmall />
                            </div>
                        )}

                        {view === 'game' && (
                            <div className="w-full max-w-6xl h-full flex flex-col pb-4 min-h-0">
                                <div className="text-center mb-6 shrink-0">
                                    <span className="bg-red-900/90 px-8 py-2 rounded-full border-2 border-yellow-600 text-yellow-400 font-black text-xl shadow-lg">
                                        挑戰：第 {(round * 20 + 1).toString()} - {(round * 20 + Math.min(20, currentRoundRiddles.length)).toString()} 題
                                    </span>
                                </div>
                                <div className="flex-1 overflow-y-auto custom-scrollbar p-6 bg-red-900/20 rounded-[3rem] border-2 border-yellow-600/10 min-h-0">
                                    <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-x-8 gap-y-12 justify-items-center py-4">
                                        {currentRoundRiddles.map((r, i) => (
                                            <Lantern key={r.id} number={round * 20 + i + 1} category={r.category} isDone={completed.has(i)} onClick={() => handleRiddleClick(i)} />
                                        ))}
                                    </div>
                                </div>
                                <Footer isSmall />
                            </div>
                        )}

                        {view === 'roundSummary' && (
                            <div className="text-center space-y-6 h-full flex flex-col justify-center">
                                <div className="text-9xl mb-4">🏆</div>
                                <h2 className="text-6xl font-black text-yellow-500">挑戰完成！</h2>
                                <div className="bg-red-900/60 p-10 rounded-[3rem] border-2 border-yellow-600/30 inline-block min-w-[400px]">
                                    {mode === 'group' && (
                                        <div className="space-y-4">
                                            {[...Array(teamCount)].map((_, i) => (
                                                <div key={i} className="flex justify-between items-center text-3xl px-8 py-3 bg-black/30 rounded-2xl">
                                                    <span className="font-black text-yellow-50">第 {i + 1} 組</span>
                                                    <span className="font-black text-yellow-400">{scores[i] || 0} 分</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="flex gap-8 justify-center">
                                    <button onClick={() => setView('result')} className="bg-red-800 text-yellow-400 px-12 py-5 rounded-[2rem] text-3xl font-black active:translate-y-1">結束遊戲</button>
                                    {(round + 1) * 20 < gameRiddles.length && (
                                        <button onClick={handleNextRound} className="bg-yellow-600 text-red-950 px-12 py-5 rounded-[2rem] text-3xl font-black flex items-center gap-4 active:translate-y-1 shadow-lg">下一輪 <Icon name="arrowRight" size={32}/></button>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'result' && (
                            <div className="text-center space-y-8 h-full flex flex-col justify-center">
                                <div className="text-9xl mb-4">🎆</div>
                                <h2 className="text-7xl font-black text-yellow-500">燈謎大會大成功</h2>
                                <div className="bg-red-900/50 p-12 rounded-[4rem] border-2 border-yellow-600/30 inline-block min-w-[500px]">
                                    <p className="text-4xl mb-8 font-black">耗時：<span className="text-yellow-400 font-mono text-6xl">{formatTime(timer)}</span></p>
                                    {mode === 'group' && (
                                        <div className="space-y-4">
                                            {[...Array(teamCount)].map((_, i) => (
                                                <div key={i} className={`flex justify-between items-center text-4xl px-12 py-6 rounded-[2rem] ${scores[i] === Math.max(...Object.values(scores)) ? 'bg-yellow-600/30 border-2 border-yellow-500' : 'bg-black/60'}`}>
                                                    <span className="font-serif">第 {i + 1} 組</span>
                                                    <span className="text-yellow-400 font-black">{scores[i] || 0} 分</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => setView('menu')} className="bg-yellow-600 text-red-950 px-20 py-8 rounded-[4rem] text-5xl font-black shadow-xl active:translate-y-2 mx-auto">回主畫面</button>
                                <Footer isSmall />
                            </div>
                        )}
                    </main>

                    {/* 設定視窗 - 大幅優化：縮小元件，增加題目瀏覽密度 */}
                    {isSettingsOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md animate-in fade-in">
                            <div className="bg-red-900 border-2 border-yellow-600/30 rounded-[2.5rem] w-full max-w-4xl h-[85vh] flex flex-col shadow-2xl overflow-hidden font-serif">
                                <div className="p-6 border-b border-yellow-600/20 flex justify-between items-center bg-red-800/80 shrink-0">
                                    <div>
                                        <h2 className="text-4xl font-black text-yellow-500 flex items-center gap-4"><Icon name="settings" size={32}/> 題庫設定</h2>
                                        <p className="text-yellow-200/50 text-base font-serif">拖曳排序，選取題目進入挑戰</p>
                                    </div>
                                    <button onClick={() => { sound.playClick(); setIsSettingsOpen(false); }} className="p-3 hover:bg-white/10 rounded-full text-yellow-500"><Icon name="close" size={32} /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 custom-scrollbar space-y-6 bg-red-950/40">
                                    <div className="bg-red-900/60 p-6 rounded-3xl border border-yellow-600/20 shadow-inner shrink-0">
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                            <input type="text" placeholder="類別" value={newRiddle.category} onChange={e => setNewRiddle(s => ({...s, category: e.target.value}))} className="bg-red-950 border border-yellow-600/30 rounded-xl px-4 py-2 text-lg outline-none focus:border-yellow-400 text-white" />
                                            <input type="text" placeholder="謎題" value={newRiddle.question} onChange={e => setNewRiddle(s => ({...s, question: e.target.value}))} className="bg-red-950 border border-yellow-600/30 rounded-xl px-4 py-2 text-lg outline-none focus:border-yellow-400 text-white md:col-span-2" />
                                            <div className="flex gap-4">
                                                <input type="text" placeholder="謎底" value={newRiddle.answer} onChange={e => setNewRiddle(s => ({...s, answer: e.target.value}))} className="flex-1 bg-red-950 border border-yellow-600/30 rounded-xl px-4 py-2 text-lg outline-none focus:border-yellow-400 text-white" />
                                                <button onClick={addNewRiddle} className="bg-yellow-600 text-red-950 px-6 rounded-xl font-black hover:bg-yellow-500 transition-all shrink-0">新增</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-center px-2">
                                            <h3 className="text-xl font-black text-yellow-500/80 tracking-widest">全部題庫 ({riddlePool.length} 題)</h3>
                                            <div className="flex gap-6 text-sm font-bold text-yellow-500/60 underline underline-offset-4">
                                                <button onClick={() => setSelectedPoolIds(new Set(riddlePool.map(r => r.id)))}>全選</button>
                                                <button onClick={() => setSelectedPoolIds(new Set())}>清空</button>
                                            </div>
                                        </div>
                                        <div className="grid gap-2">
                                            {riddlePool.map((r, idx) => (
                                                <div key={r.id} draggable onDragStart={() => handleDragStart(idx)} onDragOver={handleDragOver} onDrop={() => handleDrop(idx)}
                                                    className={`bg-red-900/40 p-3 rounded-xl border border-yellow-600/10 flex items-center justify-between group cursor-grab active:cursor-grabbing hover:bg-red-900/80 transition-all ${draggedIdx === idx ? 'opacity-20' : ''}`} >
                                                    <div className="flex items-center gap-4 flex-1 text-white">
                                                        <Icon name="grip" size={20} className="text-yellow-600/20" />
                                                        <div className="text-base font-black text-yellow-500/60 w-8">#{idx + 1}</div>
                                                        <button onClick={() => { sound.playClick(); const n = new Set(selectedPoolIds); if(n.has(r.id)) n.delete(r.id); else n.add(r.id); setSelectedPoolIds(n); }} className={`w-7 h-7 rounded-lg border flex items-center justify-center transition-all ${selectedPoolIds.has(r.id) ? 'bg-yellow-500 border-yellow-200 text-red-950' : 'border-yellow-600/20 text-transparent'}`} ><Icon name="check" size={18} /></button>
                                                        <div className="flex flex-col ml-2 overflow-hidden">
                                                            <span className="text-[10px] text-yellow-500/40 font-black uppercase tracking-widest">{r.category}</span>
                                                            <span className="text-base font-medium line-clamp-1 opacity-90">{r.question}</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-6 pr-4">
                                                        <span className="text-sm text-yellow-400/70 font-mono bg-black/20 px-3 py-1 rounded-lg">謎底: {r.answer}</span>
                                                        <button onClick={() => setRiddlePool(prev => prev.filter(x => x.id !== r.id))} className="text-red-500 opacity-0 group-hover:opacity-100 p-2 hover:bg-red-500/20 rounded-full transition-all"><Icon name="trash" size={18} /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 border-t border-yellow-600/20 text-center bg-red-800 shrink-0"><button onClick={() => setIsSettingsOpen(false)} className="bg-yellow-600 text-red-950 px-12 py-3 rounded-2xl text-xl font-black shadow-lg">確認並儲存題庫</button></div>
                            </div>
                        </div>
                    )}

                    {/* 答題視窗 - 精簡比例 */}
                    {selectedRiddle && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl animate-in fade-in">
                            <div className="bg-red-800 border-4 border-yellow-500 rounded-[5rem] max-w-4xl w-full max-h-[90vh] overflow-y-auto shadow-2xl relative custom-scrollbar flex flex-col items-center">
                                {mode === 'group' && (
                                    <div className="sticky top-8 left-8 z-50 pointer-events-none w-full px-8">
                                        <div className="bg-white/90 backdrop-blur-lg text-red-950 px-8 py-3 rounded-full font-serif font-black shadow-2xl border border-red-900/10 text-3xl w-fit">
                                            第 {activeTeamIdx + 1} 組
                                        </div>
                                    </div>
                                )}
                                <div className="text-center p-12 md:p-16 space-y-12 w-full">
                                    <div className="inline-block px-10 py-3 bg-yellow-600 text-red-950 rounded-full text-3xl font-serif font-black shadow-lg border-b-4 border-yellow-800">{selectedRiddle.category} 謎題</div>
                                    <h3 className="text-6xl md:text-7xl font-serif font-black leading-tight text-yellow-50 tracking-wider drop-shadow-lg">{selectedRiddle.question}</h3>
                                    <div className="flex justify-center gap-6 flex-wrap">
                                        {[...selectedRiddle.answer].map((char, i) => (
                                            <div key={i} className={`w-24 h-24 md:w-28 md:h-28 border-2 rounded-[2rem] flex items-center justify-center text-6xl font-black transition-all ${i < hintLevel || showFullAnswer ? 'bg-yellow-500 text-red-950 border-yellow-200 scale-105 shadow-xl' : 'bg-red-950/50 border-yellow-600/30 text-transparent'}`}>
                                                {(i < hintLevel || showFullAnswer) ? char : '?'}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="space-y-10 w-full">
                                        {!showFullAnswer && (
                                            <input autoFocus type="text" placeholder="請輸入謎底..." value={userInput} onChange={(e) => setUserInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && checkAnswer()}
                                                className={`w-full bg-red-950 border-2 border-yellow-600/40 rounded-[3rem] px-10 py-8 text-5xl text-center outline-none focus:border-yellow-400 text-white`} />
                                        )}
                                        <div className="grid grid-cols-2 gap-8">
                                            <button onClick={() => { if(hintLevel < selectedRiddle.answer.length) setHintLevel(h => h+1); }} disabled={hintLevel >= selectedRiddle.answer.length || showFullAnswer} className="py-8 rounded-[2.5rem] bg-orange-700 hover:bg-orange-600 text-yellow-100 flex items-center justify-center gap-6 disabled:opacity-30 transition-all font-black text-3xl shadow-xl active:translate-y-1"><Icon name="bulb" size={32}/> 提示</button>
                                            <button onClick={() => { setShowFullAnswer(true); setUserInput(selectedRiddle.answer); }} disabled={showFullAnswer} className="py-8 rounded-[2.5rem] bg-yellow-900 hover:bg-yellow-800 text-yellow-400 flex items-center justify-center gap-6 disabled:opacity-30 transition-all font-black text-3xl shadow-xl active:translate-y-1"><Icon name="eye" size={32}/> 公布答案</button>
                                        </div>
                                        <div className="flex gap-8 pt-8">
                                            <button onClick={() => { sound.playClick(); setSelectedRiddle(null); }} className="flex-1 py-8 rounded-[3rem] border-2 border-yellow-700/50 hover:bg-red-700 text-yellow-600 font-serif font-black text-3xl">離開</button>
                                            <button onClick={checkAnswer} className="flex-[2] py-8 rounded-[3rem] bg-yellow-500 hover:bg-yellow-400 text-red-950 font-black text-5xl shadow-2xl active:translate-y-1 border-b-[12px] border-yellow-800 transition-all">
                                                {showFullAnswer ? (mode === 'group' ? '確認下一組' : '確認下一題') : '確定提交'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
